[pytest]
# 统一测试配置
testpaths =
    test
    fund/test
    local/app/*/test

python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 覆盖率设置
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# 忽略目录
norecursedirs =
    node_modules
    __pycache__
    .git
    .venv
    venv
    output
    dist
    build
    .codebuddy
    .playwright-cli

# 标记定义
markers =
    slow: 标记为慢速测试（默认不运行）
    network: 需要网络访问的测试
    skip_ci: 跳过 CI 环境
    unit: 单元测试
    integration: 集成测试
